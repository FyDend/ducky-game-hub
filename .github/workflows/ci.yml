name: Continuous Integration & Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BRIDGE: ${{ github.repository_owner }}/ducky-game-hub-bridge-api
  IMAGE_NAME_STORE: ${{ github.repository_owner }}/ducky-game-hub-store-front
  IMAGE_NAME_GAMEPAD: ${{ github.repository_owner }}/ducky-game-hub-gamepad-daemon
  IMAGE_NAME_SUNSHINE: ${{ github.repository_owner }}/ducky-game-hub-sunshine

jobs:
  build-and-push:
    name: build y testeo de imagenes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configuración de Buildx (multi-architecture)
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Autenticación en GHCR
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Convertimos los nombres de imágenes a minúsculas
      - name: Convert image names to lowercase
        id: string
        run: |
          echo "bridge_lc=$(echo ${{ env.IMAGE_NAME_BRIDGE }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "store_lc=$(echo ${{ env.IMAGE_NAME_STORE }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "gamepad_lc=$(echo ${{ env.IMAGE_NAME_GAMEPAD }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "sunshine_lc=$(echo ${{ env.IMAGE_NAME_SUNSHINE }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 5. Compilar y subir Bridge API
      - name: Build and push Bridge API
        uses: docker/build-push-action@v5
        with:
          context: ./bridge_api
          file: ./bridge_api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.string.outputs.bridge_lc }}:latest
            ${{ env.REGISTRY }}/${{ steps.string.outputs.bridge_lc }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Compilar y subir Store Front
      - name: Build and push Store Front
        uses: docker/build-push-action@v5
        with:
          context: ./store_front
          file: ./store_front/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.string.outputs.store_lc }}:latest
            ${{ env.REGISTRY }}/${{ steps.string.outputs.store_lc }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. Compilar y subir Gamepad Daemon
      - name: Build and push Gamepad Daemon
        uses: docker/build-push-action@v5
        with:
          context: ./daemon
          file: ./daemon/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.string.outputs.gamepad_lc }}:latest
            ${{ env.REGISTRY }}/${{ steps.string.outputs.gamepad_lc }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Compilar y subir Sunshine (comparte Dockerfile con bridge_api)
      - name: Build and push Sunshine
        uses: docker/build-push-action@v5
        with:
          context: ./bridge_api
          file: ./bridge_api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.string.outputs.sunshine_lc }}:latest
            ${{ env.REGISTRY }}/${{ steps.string.outputs.sunshine_lc }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy de imagenes en contenedores
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment secrets
        run: |
          MISSING_SECRETS=0
          if [ -z "${{ secrets.HOST_IP }}" ]; then
            echo "::error::Falta el secreto 'HOST_IP' en GitHub. Configuralo con la IP de Tailscale de tu PC (ej. 100.x.y.z)."
            MISSING_SECRETS=1
          fi
          if [ -z "${{ secrets.HOST_USER }}" ]; then
            echo "::error::Falta el secreto 'HOST_USER' en GitHub. Configuralo con el nombre de usuario de tu PC (ej. fydend)."
            MISSING_SECRETS=1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Falta el secreto 'SSH_PRIVATE_KEY' en GitHub. Configuralo con tu clave privada SSH."
            MISSING_SECRETS=1
          fi
          if [ $MISSING_SECRETS -eq 1 ]; then
            exit 1
          fi

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure SSH agent and keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HOST_IP }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh "${{ secrets.HOST_USER }}"@"${{ secrets.HOST_IP }}" "
            cd /home/${{ secrets.HOST_USER }}/Proyectos/RetroCloud-Patolinux &&
            git stash || true &&
            git pull origin main &&
            git stash pop || true &&
            docker compose build &&
            docker compose up -d
          "