name: Continuous Integration & Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BRIDGE: ${{ github.repository_owner }}/ducky-game-hub-bridge-api
  IMAGE_NAME_STORE: ${{ github.repository_owner }}/ducky-game-hub-store-front

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configuración de Buildx (multi-architecture)
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Autenticación en GHCR
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Convertimos los nombres de imágenes a minúsculas
      - name: Convert image names to lowercase
        id: string
        run: |
          echo "bridge_lc=$(echo ${{ env.IMAGE_NAME_BRIDGE }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "store_lc=$(echo ${{ env.IMAGE_NAME_STORE }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 5. Compilar y subir Bridge API
      - name: Build and push Bridge API
        uses: docker/build-push-action@v5
        with:
          context: ./bridge_api
          file: ./bridge_api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.string.outputs.bridge_lc }}:latest
            ${{ env.REGISTRY }}/${{ steps.string.outputs.bridge_lc }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Compilar y subir Store Front
      - name: Build and push Store Front
        uses: docker/build-push-action@v5
        with:
          context: ./store_front
          file: ./store_front/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.string.outputs.store_lc }}:latest
            ${{ env.REGISTRY }}/${{ steps.string.outputs.store_lc }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Continuous Deployment (CD)
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Configure SSH agent and keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to k3s via SSH
        run: |
          ssh ${{ secrets.HOST_USER }}@${{ secrets.HOST_IP }} "
            cd /home/${{ secrets.HOST_USER }}/Proyectos/RetroCloud-Patolinux &&
            git pull origin main &&
            docker compose up -d --pull always
          "