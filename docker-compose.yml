services:

  bridge_api:
    image: ghcr.io/fydend/ducky-game-hub-bridge-api:latest
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=:0
      - WAYLAND_DISPLAY
      - XDG_RUNTIME_DIR=/run/user/${PUID}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ./bridge_api:/app
      - ./store_front:/app/store_front
      - ${ROMS_PATH}:/roms
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /run/user/${PUID}:/run/user/${PUID}
      - /run/udev:/run/udev:ro
      - ./data/retroarch:/root/.config/retroarch
      - ./data/sunshine:/root/.config/sunshine
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  sunshine:
    image: ghcr.io/fydend/ducky-game-hub-sunshine:latest
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=:0
      - WAYLAND_DISPLAY
      - XDG_RUNTIME_DIR=/run/user/${PUID}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /run/user/${PUID}:/run/user/${PUID}
      - /run/udev:/run/udev:ro
      - ./data/sunshine:/root/.config/sunshine
    command: sunshine
    restart: unless-stopped

  gamepad_daemon:
    image: ghcr.io/fydend/ducky-game-hub-gamepad-daemon:latest
    network_mode: host
    pid: "service:bridge_api"
    devices:
      - /dev/input:/dev/input
    volumes:
      - /run/udev:/run/udev:ro
    environment:
      - PUID=${PUID}
    restart: unless-stopped

  store_front:
    image: ghcr.io/fydend/ducky-game-hub-store-front:latest
    network_mode: host
    environment:
      - DISPLAY=:0
      - WAYLAND_DISPLAY
      - XDG_RUNTIME_DIR=/run/user/${PUID}
    volumes:
      - ./store_front:/app
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /run/user/${PUID}:/run/user/${PUID}:ro
    devices:
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
    restart: "no"
    shm_size: '2gb'

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBIT_PORT}
    volumes:
      - ./qbittorrent/config:/config
      - ${ROMS_PATH}:/roms
    ports:
      - ${QBIT_PORT}:${QBIT_PORT}
      - ${QBIT_TORRENT_PORT}:${QBIT_TORRENT_PORT}
      - ${QBIT_TORRENT_PORT}:${QBIT_TORRENT_PORT}/udp
    extra_hosts:
      - "localhost:127.0.0.1"
    restart: unless-stopped
