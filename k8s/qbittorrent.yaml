apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: ducky-game-hub
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          env:
            - name: PUID
              valueFrom:
                configMapKeyRef:
                  name: ducky-game-hub-config
                  key: PUID
            - name: PGID
              valueFrom:
                configMapKeyRef:
                  name: ducky-game-hub-config
                  key: PGID
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: ducky-game-hub-config
                  key: TZ
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: webui
            - containerPort: 60881
              name: torrent-tcp
              protocol: TCP
            - containerPort: 60881
              name: torrent-udp
              protocol: UDP
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: roms-volume
              mountPath: /roms
      volumes:
        - name: config-volume
          hostPath:
            path: $WORKSPACE_PATH/qbittorrent/config
            type: DirectoryOrCreate
        - name: roms-volume
          hostPath:
            path: $WORKSPACE_PATH/data/roms
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-service
  namespace: ducky-game-hub
spec:
  selector:
    app: qbittorrent
  ports:
    - name: webui
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: torrent-tcp
      protocol: TCP
      port: 60881
      targetPort: 60881
    - name: torrent-udp
      protocol: UDP
      port: 60881
      targetPort: 60881
  type: LoadBalancer
